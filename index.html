<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="script-src 'self';" />
    <title>Heroic Games Launcher</title>
    <script type="module" src="/src/frontend/index.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
    <style id="customCSS"></style>

    <style>
      /* =========================================
       HEROIC CUSTOM - CYAN THEME & BACKGROUND
       ========================================= */

      /* 1.1 e 1.4: Forçando o Background Profundo e Cores Globais */
      :root,
      [data-theme],
      body,
      #root {
        background: radial-gradient(
          circle at 50% 50%,
          #011018 0%,
          #070707 50%,
          #000000 100%
        ) !important;
        background-color: #000000 !important;
        background-attachment: fixed !important;

        /* Substituindo as cores principais pelo Ciano Neon (#00FFFF) */
        --color-primary: #00ffff !important;
        --color-accent: #00ffff !important;
        --accent-color: #00ffff !important;
        --text-color-primary: #ffffff !important;
      }

      /* 1.2 e 1.3: Arredondamento e Brilho (Glow) global para botões e interações */
      button,
      .btn,
      [role='button'],
      .game-card {
        border-radius: 12px !important;
        transition: all 0.3s ease !important;
      }

      button:hover,
      .btn:hover,
      .game-card:hover {
        box-shadow: 0 0 12px rgba(0, 255, 255, 0.6) !important;
        border-color: #00ffff !important;
      }

      /* Limpando fundos cinzas originais para mostrar nosso background */
      div[class*='Container'],
      div[class*='Wrapper'],
      nav {
        background-color: transparent !important;
      }
    </style>
  </body>
</html>
